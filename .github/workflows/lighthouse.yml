# AURA-206 — Lighthouse advisory CI (ENABLED — advisory / non-blocking).
#
# Per CF-4 and AURA-206, Lighthouse runs as an ADVISORY job on PRs to `develop` now
# that public pages exist to score meaningfully. It is intentionally NON-BLOCKING and
# is NOT a required branch-protection status check (docs/BRANCH_PROTECTION.md is
# unchanged): `continue-on-error: true` means a poor score never fails the PR, and no
# score thresholds / assertions are enforced here.
#
# Hard-gating (Desktop > 90, Mobile > 75 cinematic / 80 prod, CLS < 0.1 — see
# docs/CI_CD_STRATEGY.md "Lighthouse Timing" and docs/QUALITY_GATES.md) is DEFERRED to
# the production release gate (AURA-505). Do NOT add this job to required checks.
#
# Authority: CF-4 (docs/CI_CD_STRATEGY.md), docs/QUALITY_GATES.md (Lighthouse advisory
# from Phase 2; hard gate at release). Uses the treosh/lighthouse-ci-action GitHub
# Action — no npm Lighthouse dependency is added to the project.

name: Lighthouse (advisory — non-blocking)

on:
  pull_request:
    branches: [develop]

permissions:
  contents: read

concurrency:
  group: lighthouse-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: lighthouse-advisory
    runs-on: ubuntu-latest
    # ADVISORY: the entire job is allowed to fail without failing the PR. Combined with
    # the absence of this job from branch protection, Lighthouse can never block a merge.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Pin npm version
        run: npm install -g npm@11.12.1

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start server
        run: npm run start &

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000/en > /dev/null 2>&1; then
              echo "Server ready after ${i} attempt(s)"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done

      # Advisory audit: no `configPath`/assertions are supplied, so NO score thresholds
      # are enforced. Results are uploaded to temporary public storage for human review.
      - name: Run Lighthouse (advisory)
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000/en
          uploadArtifacts: true
          temporaryPublicStorage: true
