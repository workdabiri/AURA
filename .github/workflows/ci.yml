# AURA-007 — Continuous Integration (quality gate)
#
# Runs the full merge-blocker quality gate on every PR to `develop` and on
# pushes to `develop`. This is the single required status check named `quality`
# (see docs/BRANCH_PROTECTION.md). A failing step fails the job; the step name
# shows which gate broke.
#
# Authority: A-01 (one workflow: npm run quality + Playwright on PR; CodeQL
# scheduled/PR), docs/CI_CD_STRATEGY.md (CI pipeline), docs/QUALITY_GATES.md.
#
# Scope notes:
#   - In the `quality` job the DAL / integration / security suites run as plain
#     Vitest: their static assertions run, and the gated live-DB tests self-skip
#     without SUPABASE_LOCAL_TESTS=1. AURA-107 added the separate `db-tests` job
#     below, which boots the Supabase CLI local stack in Docker and runs those
#     same suites in live DB mode (SUPABASE_LOCAL_TESTS=1). Do NOT mock the DB
#     layer (A-02).
#   - Playwright/e2e is deferred to AURA-008 (smoke spec is `test.describe.skip`
#     until then; `/`→`/en` does not exist yet). See the disabled `e2e` job below.
#   - Lighthouse is a separate, disabled stub (lighthouse.yml), enabled as an
#     advisory job in AURA-206 (CF-4). It is never a required check.

name: CI

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]

# Never auto-target `main` — main is manual/production-only (CLAUDE.md, A-01).

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Upgrade npm to 11 to match local development (npm 10 / Node 20 LTS enforces
      # peer-dependency resolution more strictly than npm 11, causing `npm ci` to
      # reject a lockfile that npm 11 accepts as valid — specifically, @swc/helpers
      # 0.5.15 vs the >=0.5.17 peer-dep declared by next-intl's nested @swc/core).
      # The Node runtime stays at 20 LTS; only the package manager is upgraded.
      - name: Pin npm version
        run: npm install -g npm@11.12.1

      - name: Verify npm version
        run: npm --version

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Unit tests
        run: npm run test:unit

      # DAL / integration / security here run the static + gated suites only —
      # the live-DB tests self-skip without SUPABASE_LOCAL_TESTS=1. The live DB
      # run is the separate `db-tests` job below (Dockerized Supabase, A-02).
      - name: DAL tests
        run: npm run test:dal

      - name: Integration tests
        run: npm run test:integration

      - name: Security negative tests
        run: npm run test:security

      - name: Dependency boundary check
        run: npm run deps:check

      - name: Unused code check
        run: npm run unused

      - name: Build
        run: npm run build

      - name: Dependency audit (high/critical)
        run: npm run audit

  # ---------------------------------------------------------------------------
  # AURA-008: Playwright smoke — enabled now that /→/en redirect and /en shell
  # exist. Builds the production bundle, starts `next start`, waits for the
  # server, then runs the smoke spec. This job is NOT yet a required branch-
  # protection check; once it runs green on this PR the `develop` protection
  # rule will be updated to require `e2e` (docs/BRANCH_PROTECTION.md).
  # ---------------------------------------------------------------------------
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Pin npm version
        run: npm install -g npm@11.12.1

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Start server
        run: npm run start &

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done

      - name: Run smoke tests
        run: npm run test:smoke -- --project=chromium
        env:
          BASE_URL: http://localhost:3000
          CI: true

  # ---------------------------------------------------------------------------
  # AURA-107 (Phase 1 exit gate): live DB tests against a Dockerized Supabase
  # local stack. Boots the Supabase CLI stack, applies all migrations via
  # `supabase db reset`, then runs the DAL / security / integration suites in
  # live mode (SUPABASE_LOCAL_TESTS=1) — the gated tests that self-skip in the
  # `quality` job. No DB mocking (A-02). This job is NOT yet a required branch-
  # protection check; the owner adds `db-tests` to the `develop` rule after the
  # first green run (docs/BRANCH_PROTECTION.md).
  # ---------------------------------------------------------------------------
  db-tests:
    name: db-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Live-DB gating for the suites. SUPABASE_DB_URL points at the Supabase CLI
    # local Postgres (port 54322); the test harness shells out to `psql` against it.
    env:
      SUPABASE_LOCAL_TESTS: '1'
      SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Pin npm version
        run: npm install -g npm@11.12.1

      - name: Install dependencies
        run: npm ci

      - name: Ensure psql client is available
        run: |
          if ! command -v psql > /dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y postgresql-client
          fi
          psql --version

      # Pin the CLI version: `latest` resolves via a GitHub API call that is
      # rate-limited on shared runners (observed flake), and a pinned version is
      # deterministic. 2.106.0 matches the locally-verified stack (CURRENT_STATE.md).
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.106.0

      - name: Start Supabase local stack
        run: supabase start

      - name: Reset database (apply all migrations)
        run: supabase db reset

      - name: Wait for Postgres to be ready
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h 127.0.0.1 -p 54322 -U postgres > /dev/null 2>&1; then
              echo "Postgres ready after ${i} attempt(s)"
              break
            fi
            echo "Waiting for Postgres... ($i/30)"
            sleep 2
          done
          pg_isready -h 127.0.0.1 -p 54322 -U postgres

      - name: DAL tests (live DB)
        run: npm run test:dal

      - name: Security negative tests (live DB)
        run: npm run test:security

      - name: Integration tests (live DB)
        run: npm run test:integration

      # Tolerate a teardown when the CLI never installed (e.g. setup-cli failed),
      # so the real failure surfaces instead of a misleading "command not found".
      - name: Stop Supabase local stack
        if: always()
        run: command -v supabase >/dev/null 2>&1 && supabase stop || echo "supabase CLI not installed; nothing to stop"
